<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>LabVirtual</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; position:fixed; top:0; left:0; z-index:9999; padding:20px; font-family:monospace; width:100%; white-space:pre-wrap;">' + e.message + '<br/>' + e.filename + ':' + e.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.body.innerHTML += '<div style="color:red; background:white; position:fixed; top:0; left:0; z-index:9999; padding:20px; font-family:monospace; width:100%; white-space:pre-wrap;">Unhandled Rejection: ' + (e.reason && e.reason.message ? e.reason.message : e.reason) + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
